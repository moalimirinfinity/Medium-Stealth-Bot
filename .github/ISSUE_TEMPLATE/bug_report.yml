name: Bug Report
description: Report a reproducible defect
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide exact commands/inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, uv version, command mode.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Artifacts
      description: Paste sanitized output only. Do not include cookies/secrets.

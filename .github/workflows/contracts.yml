name: Contracts

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v4

      - name: Sync Dependencies
        run: uv sync

      - name: Compile
        run: uv run python -m compileall -q src

      - name: Validate Contract Registry
        run: uv run bot contracts --tag programming --no-execute-reads

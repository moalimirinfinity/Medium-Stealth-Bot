name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for manual runs), e.g. v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup UV
        uses: astral-sh/setup-uv@v4

      - name: Resolve Release Tag
        id: resolve_tag
        env:
          INPUT_TAG: ${{ inputs.tag_name || '' }}
        run: |
          set -euo pipefail
          resolved_tag=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            resolved_tag="${GITHUB_REF_NAME}"
          else
            if [[ -z "${INPUT_TAG}" ]]; then
              echo "tag_name input is required for workflow_dispatch runs."
              exit 1
            fi
            resolved_tag="${INPUT_TAG}"
          fi
          if [[ ! "${resolved_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match v<major>.<minor>.<patch>; got: ${resolved_tag}"
            exit 1
          fi
          echo "value=${resolved_tag}" >> "$GITHUB_OUTPUT"

      - name: Sync Dependencies
        run: uv sync --group dev

      - name: Validate Tag Matches Project Version
        env:
          RESOLVED_TAG: ${{ steps.resolve_tag.outputs.value }}
        run: |
          set -euo pipefail
          PROJECT_VERSION="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          if [[ "${RESOLVED_TAG}" != "v${PROJECT_VERSION}" ]]; then
            echo "Release tag ${RESOLVED_TAG} does not match pyproject version v${PROJECT_VERSION}."
            exit 1
          fi

      - name: Compile
        run: uv run python -m compileall -q src

      - name: Capture Integrity
        env:
          CAPTURE_MAX_AGE_DAYS: "45"
        run: uv run python scripts/check_capture_integrity.py

      - name: Capture Sanitization Check
        run: uv run python scripts/check_capture_sanitization.py

      - name: Response Contract Path Check
        run: uv run python scripts/check_response_contract_paths.py

      - name: Tests
        run: uv run pytest -q

      - name: Validate Contract Registry
        env:
          CONTRACT_REGISTRY_VALIDATE_RESPONSE_FIELDS: "true"
        run: uv run bot contracts --tag programming --no-execute-reads

      - name: Validate Production Profile Template
        run: uv run bot profile-validate --env-path .env.production.example

      - name: Build Distribution Artifacts
        run: uv build

      - name: Generate Checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*

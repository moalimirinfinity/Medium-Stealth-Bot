            - paragraph [ref=e184]: It was 1999. We were young, optimistic, and slightly dangerous. Forte 4GL with TOOL (TOOL being Forte’s proprietary programming language) was our shiny playground, Oracle was humming in the background, and object orientation had achieved the status of religion. Not “we like objects” religion. More like “if it’s not an object it’s morally wrong” religion.
            - paragraph [ref=e185]:
              - text: Primitive data types? Evil.
              - text: Strings and integers without a wrapper class? Barbaric.
              - text: We didn’t just build an object model — we crafted a cathedral of inheritance.
            - paragraph [ref=e186]: We had hierarchies so deep that some classes probably needed oxygen masks. The only thing we were complaining about was the lack of multiple inheritance. Several colleagues came from C++ and felt personally insulted that the language wasn’t giving them even more ways to shoot themselves in the foot — somewhat ironic, given that even in 1999 multiple inheritance was widely…
